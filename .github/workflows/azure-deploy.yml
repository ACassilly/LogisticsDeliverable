name: Azure VM Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ssh-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_KEY_B64: ${{ secrets.SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USERNAME@$SSH_HOST" << 'DEPLOY'
          set -e
          cd /opt/LogisticsDeliverable
          git fetch origin main && git reset --hard origin/main
          # Build the pattern dynamically so this YAML file never contains the literal bg-[url(...)] class
          # that Tailwind v4's content scanner would otherwise pick up
          ASSET="pattern-bg.svg"
          PATTERN="bg-\\[url('/images/hero/$ASSET')\\]"
          grep -rl "$PATTERN" src 2>/dev/null | xargs -r sed -i "s|$PATTERN||g" || true
          export CI=true
          corepack enable || sudo corepack enable
          corepack prepare pnpm@latest --activate || sudo corepack prepare pnpm@latest --activate
          pnpm install --no-frozen-lockfile
          rm -rf .next node_modules/.cache
          NEXT_PUBLIC_APP_URL=https://portlandialogistics.com pnpm build
          sudo pkill -f "PM2|pm2\b" 2>/dev/null || true
          sudo fuser -k 3000/tcp 2>/dev/null || true
          sleep 2
          pm2 kill 2>/dev/null || true
          pm2 start node_modules/next/dist/bin/next --name portlandia-logistics -- start -p 3000
          pm2 save
          sleep 3
          curl --fail --silent --show-error http://localhost:3000 >/dev/null
          curl --fail --silent --show-error -o /dev/null http://localhost:3000/images/services/ltl-hero.png
          echo "Deploy successful!"
          DEPLOY
