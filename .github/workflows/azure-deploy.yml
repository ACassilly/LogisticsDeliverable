name: Azure VM Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ssh-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "Deploying to Azure VM at 52.188.149.177"
            cd /opt/LogisticsDeliverable
            git pull origin main
            npm install -g pnpm
            pnpm install --frozen-lockfile
            NEXT_PUBLIC_APP_URL=https://portlandialogistics.com pnpm build
            pm2 restart portlandia-logistics
            echo "Verifying app status..."
            curl --fail --silent --show-error http://localhost:3000
